exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

# Idle management
exec-once = systemctl --user start hypridle

# Polkit agent
exec-once = systemctl --user start hyprpolkitagent

# archdots
exec-once = dots health configure autostart_scripts_export
exec-once = sleep 2&&dots autostart hyprland_programs --restart &>/tmp/autostart-once.log
exec = dots autostart hyprland_programs &>/tmp/autostart.log

# darkmode
exec = gsettings set org.gnome.desktop.interface gtk-theme "TokyoNight"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
