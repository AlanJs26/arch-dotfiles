
plugin {
    scroller {
        window_default_height = onehalf
      }
  }

# Move focus with mainMod + arrow keys
bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d
bind = Super, home, scroller:movefocus, begin
bind = Super, end, scroller:movefocus, end

# Movement
bind = Super CTRL, h, movewindow, l
bind = Super CTRL, l, movewindow, r
bind = Super CTRL, k, movewindow, u
bind = Super CTRL, j, movewindow, d
bind = Super CTRL, home, scroller:movewindow, begin
bind = Super CTRL, end, scroller:movewindow, end

# Modes
bind = Super, bracketleft, scroller:setmode, row
bind = Super, bracketright, scroller:setmode, col

# Set Mode Modifiers submap
# will switch to a submap called modifiers
bind = Super, backslash, submap, modifiers
# will start a submap called "modifiers"
submap = modifiers
bind = , l, scroller:setmodemodifier, after
bind = , l, submap, reset
bind = , h, scroller:setmodemodifier, before
bind = , h, submap, reset
bind = , home, scroller:setmodemodifier, beginning
bind = , home, submap, reset
bind = , end, scroller:setmodemodifier, end
bind = , end, submap, reset
bind = , k, scroller:setmodemodifier, , focus
bind = , k, submap, reset
bind = , j, scroller:setmodemodifier, , nofocus
bind = , j, submap, reset
bind = , 2, scroller:setmodemodifier, , , auto, 2
bind = , 2, submap, reset
bind = , 3, scroller:setmodemodifier, , , auto, 3
bind = , 3, submap, reset
bind = , m, scroller:setmodemodifier, , , manual
bind = , m, submap, reset
# use reset to go back to the global submap
bind = , escape, submap, reset
# will reset the submap, meaning end the current one and return to the global one
submap = reset

# Sizing keys
# bind = Super, equal, scroller:cyclesize, next
# bind = Super, minus, scroller:cyclesize, prev
bind = Super, equal, scroller:cyclewidth, next
bind = Super, minus, scroller:cyclewidth, prev
bind = Super SHIFT, equal, scroller:cycleheight, next
bind = Super SHIFT, minus, scroller:cycleheight, prev

# Sizes submap
# will switch to a submap called sizing
bind = Super, b, submap, sizing
# will start a submap called "align"
submap = sizing
# sets repeatable binds for aligning the active window
bind = , 1, scroller:setsize, oneeighth
bind = , 1, submap, reset
bind = , 2, scroller:setsize, onesixth
bind = , 2, submap, reset
bind = , 3, scroller:setsize, onefourth
bind = , 3, submap, reset
bind = , 4, scroller:setsize, onethird
bind = , 4, submap, reset
bind = , 5, scroller:setsize, threeeighths
bind = , 5, submap, reset
bind = , 6, scroller:setsize, onehalf
bind = , 6, submap, reset
bind = , 7, scroller:setsize, fiveeighths
bind = , 7, submap, reset
bind = , 8, scroller:setsize, twothirds
bind = , 8, submap, reset
bind = , 9, scroller:setsize, threequarters
bind = , 9, submap, reset
bind = , 0, scroller:setsize, fivesixths
bind = , 0, submap, reset
bind = , minus, scroller:setsize, seveneighths
bind = , minus, submap, reset
bind = , equal, scroller:setsize, one
bind = , equal, submap, reset
# use reset to go back to the global submap
bind = , escape, submap, reset
# will reset the submap, meaning end the current one and return to the global one
submap = reset

# Admit/Expel
bind = Super, I, scroller:admitwindow,
bind = Super, O, scroller:expelwindow,

# Center submap
# will switch to a submap called center
bind = Super, C, submap, center
# will start a submap called "center"
submap = center
# sets repeatable binds for resizing the active window
bind = , C, scroller:alignwindow, c
bind = , C, submap, reset
bind = , m, scroller:alignwindow, m
bind = , m, submap, reset
bind = , l, scroller:alignwindow, r
bind = , l, submap, reset
bind = , h, scroller:alignwindow, l
bind = , h, submap, reset
bind = , k, scroller:alignwindow, u
bind = , k, submap, reset
bind = , j, scroller:alignwindow, d
bind = , j, submap, reset
# use reset to go back to the global submap
bind = , escape, submap, reset
# will reset the submap, meaning end the current one and return to the global one
submap = reset

# Resize submap
# will switch to a submap called resize
bind = Super SHIFT, R, submap, resize
# will start a submap called "resize"
submap = resize
# sets repeatable binds for resizing the active window
binde = , l, resizeactive, 100 0
binde = , h, resizeactive, -100 0
binde = , k, resizeactive, 0 -100
binde = , j, resizeactive, 0 100
# use reset to go back to the global submap
bind = , escape, submap, reset
# will reset the submap, meaning end the current one and return to the global one
submap = reset

# Fit size submap
# will switch to a submap called fitsize
bind = Super, W, submap, fitsize
# will start a submap called "fitsize"
submap = fitsize
# sets binds for fitting columns/windows in the screen
bind = , W, scroller:fitsize, visible
bind = , W, submap, reset
bind = , l, scroller:fitsize, toend
bind = , l, submap, reset
bind = , h, scroller:fitsize, tobeg
bind = , h, submap, reset
bind = , k, scroller:fitsize, active
bind = , k, submap, reset
bind = , j, scroller:fitsize, all
bind = , j, submap, reset
bind = , bracketleft, scroller:fitwidth, all
bind = , bracketleft, submap, reset
bind = , bracketright, scroller:fitheight, all
bind = , bracketright, submap, reset
# use reset to go back to the global submap
bind = , escape, submap, reset
# will reset the submap, meaning end the current one and return to the global one
submap = reset

# overview keys
# bind key to toggle overview (normal)
bind = Super, tab, scroller:toggleoverview
bind = ,mouse:275, scroller:toggleoverview

# Marks
bind = Super, M, submap, marksadd
submap = marksadd
bind = , a, scroller:marksadd, a
bind = , a, submap, reset
bind = , b, scroller:marksadd, b
bind = , b, submap, reset
bind = , c, scroller:marksadd, c
bind = , c, submap, reset
bind = , escape, submap, reset
submap = reset

bind = Super SHIFT, M, submap, marksdelete
submap = marksdelete
bind = , a, scroller:marksdelete, a
bind = , a, submap, reset
bind = , b, scroller:marksdelete, b
bind = , b, submap, reset
bind = , c, scroller:marksdelete, c
bind = , c, submap, reset
bind = , escape, submap, reset
submap = reset

bind = Super, apostrophe, submap, marksvisit
submap = marksvisit
bind = , a, scroller:marksvisit, a
bind = , a, submap, reset
bind = , b, scroller:marksvisit, b
bind = , b, submap, reset
bind = , c, scroller:marksvisit, c
bind = , c, submap, reset
bind = , escape, submap, reset
submap = reset

bind = Super CTRL, M, scroller:marksreset

# Pin
bind = Super, P, scroller:pin,

# Window copy/paste
bind = Super, Insert, scroller:selectiontoggle,
bind = Super CTRL, Insert, scroller:selectionreset,
bind = Super SHIFT, Insert, scroller:selectionmove, l
bind = Super CTRL SHIFT, Insert, scroller:selectionworkspace,

# Trails and Trailmarks
bind = Super SHIFT, semicolon, submap, trail
submap = trail
bind = , bracketright, scroller:trailnext,
bind = , bracketleft, scroller:trailprevious,
bind = , semicolon, scroller:trailnew,
bind = , semicolon, submap, reset
bind = , d, scroller:traildelete,
bind = , d, submap, reset
bind = , c, scroller:trailclear,
bind = , c, submap, reset
bind = , Insert, scroller:trailtoselection,
bind = , Insert, submap, reset
bind = , escape, submap, reset
submap = reset

bind = Super, semicolon, submap, trailmark
submap = trailmark
bind = , bracketright, scroller:trailmarknext,
bind = , bracketleft, scroller:trailmarkprevious,
bind = , semicolon, scroller:trailmarktoggle,
bind = , semicolon, submap, reset
bind = , escape, submap, reset
submap = reset

bind = Super, slash, scroller:jump,

