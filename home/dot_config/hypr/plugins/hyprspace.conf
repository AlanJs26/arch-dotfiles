bind = ALT, apostrophe, overview:toggle

plugin {
    overview {
      showEmptyWorkspace = false
      autoScroll = true
      disableGestures = true

      exitOnSwitch = true
      exitOnClick = true
      switchOnDrop = true

      autoDrag = true

      affectStrut = false
      hideRealLayers = false
      reservedArea = 30
    }
}
