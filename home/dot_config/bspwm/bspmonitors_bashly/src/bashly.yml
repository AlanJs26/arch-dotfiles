name: bspmonitors
help: use pre-configured monitor layouts in ~/.scripts/settings.json and provide a nice cli to manage them
version: 0.1.0

flags:
- long: --list_monitors
  help: list all configured monitors
- long: --list_layouts
  help: list all configured layouts

commands:
- name: list
  default: force
  private: true

  flags:
  - long: --list_monitors
    help: list all configured monitors
  - long: --list_layouts
    help: list all configured layouts

- name: auto
  help: puts all monitors side to side

- name: check
  help: check if all monitors in a given layout are available. Prints available in success if not prints nothing

  args:
  - name: name
    required: true
    help: layout name

- name: layout
  help: switch to a given layout

  args:
  - name: name
    required: true
    help: layout name

- name: query
  help: get assigned name of an layout/monitor alias

  flags:
  - long: --monitor
    help: query monitor
    arg: query
  - long: --layout
    help: query layout
    arg: query


