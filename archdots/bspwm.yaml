autostart:
  - commands:
      - fcitx5 -d
      - syncthing serve --no-browser --logfile=default
      - nm-applet
    name: hyprland_programs
    match_method: name
  - name: always_hyprland
    run_with:
      - hyprland_programs
    commands:
      - ~/.scripts/tools/cycle-audio-devices.nu --refresh||true
    daemon: false
    priority: 10
  - commands:
      - evrouter --config $HOME/.config/evrouter/.evrouterrc 
        /dev/input/by-id/usb-18f8_USB_GAMING_MOUSE-event-mouse 
        /dev/input/by-id/usb-SONiX_USB_DEVICE-event-kbd
      - jgmenu --hide-on-startup
      - greenclip daemon
      - syncthing-gtk --minimized
      - bspdragwin.py --daemon
      - unclutter --timeout 10 --exclude-root
      - eww daemon --restart
      - nm-applet
      - bspswallow
      - /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
      - dunst
      - syncthing serve --no-browser --logfile=default
      - fcitx5 -d
      - picom
    name: programs
    match_method: name
  - run_with:
      - programs
      - scripts
    name: always
    daemon: false
    priority: 10
    commands:
      - xmodmap $HOME/.config/X11/xmodmap
      - cycle-audio-devices.nu --refresh||true
      - $TOOLS/setup-monitors.sh
      - rm /tmp/.evrouter:0||true
  - match_method: cmdline
    commands:
      - $BSPDIR/color-border-mode.sh
      - $BSPDIR/fix-polybar-fullscreen.sh
      - $HOME/.config/eww/scripts/music_helper.sh --cover_daemon
    name: scripts
