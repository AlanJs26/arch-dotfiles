name: setup
help: Run a setup script
examples:
- archdots setup all          (this will run all scripts)
- archdots setup all --status (check the status of each script)

commands:
- name: all
  flags:
  - long: --force
    help: run even if setup is marked as ok
  - long: --status
    help: show status of each script

- name: git_credentials
- name: yay
- name: defaults
- name: git_delta
- name: nvim
- name: evrouter
- name: downgrade
- name: monitors
- name: pip
- name: docker
- name: ssh_agent
- name: rclone
- name: cron
- name: audiorelay
- name: amd
- name: amdgpupro
- name: cups
- name: desktop_entries
- name: display_manager
- name: terminal_history
- name: tabbed
- name: noise_cancellation

