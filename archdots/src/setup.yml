name: setup
help: Run a setup script

commands:
- name: all
  flags:
  - long: --force
    help: run even if setup is marked as ok
  - long: --status
    help: show status of each script

- name: git_credentials
- name: git_delta
- name: nvim
- name: evrouter
- name: monitors
- name: pip
- name: docker
- name: ssh_agent
- name: archdots_completions
- name: themes
- name: rclone
- name: cron
- name: audiorelay
- name: amd
- name: amdgpupro

