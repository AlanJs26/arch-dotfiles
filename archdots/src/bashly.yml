name: archdots
help: A tool for managing arch dotfiles and packages
version: 0.1.0


commands:
- import: src/setup.yml

- name: completions
  help: run `eval "\$(archdots completions)"` to add completions to your shell

- name: add
  help: Add an existing file, directory, or symlink to the source state
  args:
  - name: file
    repeatable: true
  completions:
  - <file>
  - <directory>

- name: forget
  help: Remove a target from the source state
  args:
  - name: file
    repeatable: true
  completions:
  - <file>
  - <directory>

- name: edit
  help: edit packages file
  completions:
  - $(pacdef group list)

  args:
  - name: group
    required: false
    help: specific group to edit

  flags:
  - long: --list
    help: list all groups (package definition files)

- name: diff
  help: show diff since last dotfiles sync

- name: settings
  help: print the settings based on active alternate_config

  args:
  - name: jqquery
    help: optional jq query parse settings 
  flags:
  - short: -r
    long: --raw
    help: print only the contents of the jq output


- name: alternate_config
  help: set alternate config used for wm specific configurations. Use auto for automatic detection

  args:
  - name: config
    help: alternate config name
  flags:
  - long: --current
    help: get current alternate config

- name: launch
  help: launch apps defined in ~/.scripts/settings.json
  args:
  - name: app
    help: app name
  flags:
  - long: --list
    help: list all app aliases

- name: autostart
  help: run a list of commands defined in ~/.scripts/settings.json

  commands:
  - name: all
    help: run all defined scripts and programs that are not running
    default: force
    flags:
    - long: --restart
      help: force all defined scripts and programs to restart
  - name: scripts
    help: run all defined scripts that are not running
    flags:
    - long: --restart
      help: force all defined scripts to restart
  - name: programs
    help: run all defined programs that are not running
    flags:
    - long: --restart
      help: force all defined programs to restart

- name: sync
  help: Sync apps and dotfiles

  commands:
  - name: all
    help: run all setup scripts
    default: force


  - name: apps
    flags:
    - long: --remote
      help: only use remote changes

  - name: dots

- name: cd
  help: go to chezmoi repo or pacdef groups folder location
  commands:
  - name: dots
  - name: apps

- name: review
  help: review unmanaged packages

- name: status
  help: an alias for archdots git status

- name: git
  help: run git commands from chezmoi repo
  catch_all: true

- name: list
  help: list packages (default) or tracked dotfiles
  flags:
  - long: --unmanaged
    help: only show unmanaged packages
  - long: --pending
    help: only show pending packages

  commands:
  - name: dots
    args:
    - name: folder
      required: false
      repeatable: true
    flags:
    - long: --managed
      help: only show managed dotfiles
    - long: --unmanaged
      help: only show unmanaged dotfiles
    - long: --pending
      help: only show pending dotfiles
    - long: --tree
      help: display folders as a tree
    - long: --fast
      help: do not distinguish folders from files in tree view
    - long: --level
      help: sets tree view level
      arg: level

  - name: apps
    default: force
    flags:
    - long: --unmanaged
      help: only show unmanaged packages
    - long: --pending
      help: only show pending packages

