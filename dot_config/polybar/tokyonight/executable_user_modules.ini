[module/archdots]
type = custom/script
; exec = bspc query -N -n .hidden.window|wc -l
exec = $HOME/.config/polybar/tokyonight/scripts/archdots-status.sh
interval = 60
format-background = ${color.background}
format-foreground = ${color.foreground}
format-overline = ${color.background}
format-underline = ${color.background}
format-padding = 1
click-left = kitty --class __float__ bash -c "archdots sync&&printf "Press Enter"&& read a"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/rclone]
type = custom/script
; exec = bspc query -N -n .hidden.window|wc -l
exec = [ "$(cat $HOME/.rclone_status.txt)" = "error" ] && echo "󰼣"
interval = 60
format-background = ${color.background}
format-foreground = ${color.red}
format-overline = ${color.background}
format-underline = ${color.background}
format-padding = 1
click-left = kitty --class __float__ bash -c "gum confirm \"Do you want to resync with Google Drive\" && $TOOLS/rclone-sync.sh --resync; printf "Press Enter"; read a" 

