[module/bspwm]
type = internal/bspwm

; Only show workspaces defined on the same output as the bar
; NOTE: The bspwm and XRandR monitor names must match, which they do by default.
; Default: true
pin-workspaces = true

; Output mode flags after focused state label
; Default: false
inline-mode = false

; Create click handler used to focus workspace
; Default: true
enable-click = true

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = true

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

occupied-scroll = true

; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;вҷҡ will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true

; ws-icon-[0-9]+ = label;icon
; Note that the label needs to correspond with the bspwm workspace name

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;9
ws-icon-9= 10;10
ws-icon-10= 11;11
ws-icon-11= 12;12
ws-icon-12= 13;13
ws-icon-13= 14;14
ws-icon-default=оҰў

; Available tags:
; <label-monitor>
; <label-state> - gets replaced with <label-(focused|urgent|occupied|empty)>
; <label-mode> - gets replaced with <label-(monocle|tiled|fullscreen|floating|locked|sticky|private)>
; Default: <label-state>

format = <label-state><label-mode>
format-background = ${color.background-alt-b}
format-foreground = ${color.foreground}
format-overline = ${color.background}
format-underline = ${color.background}
format-padding = 1

label-mode = %{T4}%icon%%{T-}
label-mode-padding = 3
label-mode-background = #7aa2f7
label-mode-foreground = #1f2335

; Available tokens:
; %name%
; Default: %name%
label-monitor = %name%

; If any values for label-dimmed-N are defined, the workspace/mode
; colors will get overridden with those values if the monitor is out of focus
; To only override workspaces in a specific state, use:
; label-dimmed-focused
; label-dimmed-occupied
; label-dimmed-urgent
; label-dimmed-empty
label-dimmed-focused-foreground = ${color.foreground}
; label-dimmed-underline = ${bar/top.background}
; label-dimmed-focused-background = #f00

; Available tokens:
; %name%
; %icon%
; %index%
; Default: %icon%  %name%
; label-focused = %icon%
; label-focused-foreground = #ffffff
; label-focused-background = #3f3f3f
; label-focused-underline = #fba922

label-focused = "%{T3}%name%%{T-}" 
label-focused-foreground = ${color.yellow}
label-focused-margin = 0

label-unfocused = "%icon%"
label-unfocused-foreground = ${color.foreground}

label-visible = "%icon%"
label-visible-foreground = ${color.foreground}

; Available tokens:
; %name%
; %icon%
; %index%
; Default: %icon%  %name%
label-occupied = "%icon%"
label-occupied-underline = #555555

; Available tokens:
; %name%
; %icon%
; %index%
; Default: %icon%  %name%
; label-urgent = %icon%
; label-urgent-foreground = #000000
; label-urgent-background = #bd2c40
; label-urgent-underline = #9b0a20

label-urgent = "%icon%"
label-urgent-foreground = ${color.red}

; Available tokens:
; %name%
; %icon%
; %index%
; Default: %icon%  %name%
label-empty =
; label-empty = "%{T2}%icon%%{T-}" 
; label-empty-foreground = #55

; The following labels will be used to indicate the layout/mode
; for the focused workspace. Requires <label-mode>

; Available tokens:
; None
;
; label-monocle = оЈҝ
; label-tiled = 
; label-fullscreen = о—җ
; label-floating = оҗ¶
; label-pseudotiled = P
; label-locked = оў—
; label-locked-foreground = #bd2c40
; label-sticky = о•һ
; label-sticky-foreground = #fba922
; label-private = о…Ӣ
; label-private-foreground = #bd2c40

; Separator in between workspaces
; label-separator = " "
; label-separator-padding = 2
; label-separator-foreground = #ffb52a

label-visible-padding = 0
label-occupied-padding-right = 1
label-urgent-padding = 0
label-focused-padding-right = 1
label-unfocused-padding = 0
label-empty-padding = 0


