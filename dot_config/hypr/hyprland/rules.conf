# ####### Workspace rules ########

# Smart gaps
workspace = w[tv1]f[-1]s[false], gapsout:0, gapsin:0
workspace = w[tg1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:20, bordersize:4
windowrule = bordersize 0, onworkspace:w[tv1]f[-1]s[false]
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# ####### Window rules ########
windowrule = float, class:(com.github.th_ch.youtube_music)
windowrule = float, class:(nemo)
windowrule = bordersize 3, pinned:1

# Dialog windows – float+center these windows.
windowrulev2 = center, title:^(Open File)(.*)$
windowrulev2 = center, title:^(Select a File)(.*)$
windowrulev2 = center, title:^(Choose wallpaper)(.*)$
windowrulev2 = center, title:^(Open Folder)(.*)$
windowrulev2 = center, title:^(Save As)(.*)$
windowrulev2 = center, title:^(Library)(.*)$
windowrulev2 = center, title:^(File Upload)(.*)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Select a File)(.*)$
windowrulev2 = float, title:^(Choose wallpaper)(.*)$
windowrulev2 = float, title:^(Open Folder)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(Library)(.*)$
windowrulev2 = float, title:^(File Upload)(.*)$

# Steam
windowrulev2 = suppressevent fullscreen,class:^([Ss]team)$,title:^(Steam Big Picture Mode)$
windowrulev2 = fullscreen, noanim, syncfullscreen, class:^([Ss]team)$,title:^(Steam Big Picture Mode)$
windowrulev2 = size 80%,class:^([Ss]team)$,title:^(Steam Big Picture Mode)$
windowrulev2 = center 1,class:^([Ss]team)$,title:^(Steam Big Picture Mode)$

windowrulev2 = float,class:^([Ss]team)$,title:^(Friends List)$
windowrulev2 = center,class:^([Ss]team)$,title:^(Friends List)$
windowrulev2 = size 20% 80%,class:^([Ss]team)$,title:^(Friends List)$



# Floating
windowrulev2 = float, class:^(blueberry\.py)$
windowrulev2 = float, class:^(guifetch)$   # FlafyDev/guifetch
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 45%, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 45%, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = center, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = size 45%, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = float, class:.*plasmawindowed.*
windowrulev2 = float, class:kcm_.*
windowrulev2 = float, class:(^__float__$)
windowrulev2 = center, class:(^__float__$)
windowrulev2 = center, class:nemo
windowrulev2 = float, class:.*bluedevilwizard
windowrulev2 = float, title:.*Welcome
windowrulev2 = float, title:^(illogical-impulse Settings)$
windowrulev2 = float, class:org.freedesktop.impl.portal.desktop.kde
windowrulev2 = float, class:com-azefsw-audioconnect-desktop-app-MainKt
windowrulev2 = float, title:^(Bitwarden - Vivaldi)$

windowrulev2 = float, class:^(Scangearmp2)$
windowrulev2 = center, class:^(Scangearmp2)$


# Misc
windowrulev2 = suppressevent activatefocus, class:(judo-chaves-svelte)
windowrulev2 = suppressevent activatefocus, class:(Webots)
# windowrule = noblur,  class:.*  # Disables blur for windows. Substantially improves performance.

windowrulev2 = workspace 7, class:(Webots)


# Picture-in-Picture
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = keepaspectratio, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = move 73% 72%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$ 
windowrulev2 = size 25%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = pin, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$


# ####### Layer rules ########
layerrule = xray 1, .*
layerrule = noanim, walker
layerrule = noanim, selection
layerrule = noanim, overview
layerrule = noanim, anyrun
layerrule = noanim, indicator.*
layerrule = noanim, osk
layerrule = noanim, hyprpicker

layerrule = noanim, noanim
layerrule = blur, noanim

layerrule = blur, gtk-layer-shell
layerrule = ignorezero, gtk-layer-shell
layerrule = blur, launcher
layerrule = ignorealpha 0.5, launcher
layerrule = blur, notifications
layerrule = ignorealpha 0.69, notifications
layerrule = blur, logout_dialog # wlogout


# Quickshell
layerrule = blurpopups, quickshell:.*
layerrule = blur, quickshell:.*
layerrule = ignorealpha 0.79, quickshell:.*
layerrule = animation slide, quickshell:bar
layerrule = animation fade, quickshell:screenCorners
layerrule = animation slide right, quickshell:sidebarRight
layerrule = animation slide left, quickshell:sidebarLeft
layerrule = animation slide bottom, quickshell:osk
layerrule = animation slide bottom, quickshell:dock
layerrule = blur, quickshell:session
layerrule = noanim, quickshell:session
layerrule = ignorealpha 0, quickshell:session
layerrule = animation fade, quickshell:notificationPopup
layerrule = blur, quickshell:backgroundWidgets
layerrule = ignorealpha 0.05, quickshell:backgroundWidgets
layerrule = noanim, quickshell:screenshot
layerrule = animation popin 120%, quickshell:screenCorners

# Launchers need to be FAST
layerrule = noanim, quickshell:overview
layerrule = noanim, gtk4-layer-shell

layerrule = blur, swaylock
layerrule = blur, eww
layerrule = ignorealpha 0.8, eww
