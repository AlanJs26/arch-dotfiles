# ################################### Applications ###################################

# These absolutely need to be on top, or they won't work consistently
bindnit = , Escape, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bindnit = , Escape, global, quickshell:cheatsheetClose # [hidden]
bindnit = , Escape, global, quickshell:mediaControlsClose # [hidden]
bind = Super, mouse:272, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse:273, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse:274, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse:275, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse:276, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse:277, global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse_up,  global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse_down,global, quickshell:overviewToggleReleaseInterrupt # [hidden]

bindit = ,Super_L, global, quickshell:workspaceNumber # [hidden]

#!
##! Shell
bind = Super, Space, global, quickshell:overviewToggleRelease # Toggle overview/launcher
bind = Alt, Tab, global, quickshell:overviewToggleRelease # Toggle overview/launcher
bindd = Super, Period, Emoji >> clipboard, global, quickshell:overviewEmojiToggle # Emoji picker
bindd = Super+Shift, V, Clipboard history >> clipboard, global, quickshell:overviewClipboardToggle # Clipboard history

bindd = Super, Y, Toggle bar, global, quickshell:barToggle # Toggle bar

# Zoxide
bind = Super+Ctrl, Space, exec, ~/.scripts/rofi-scripts/rofi-zoxide.s # [hidden] 

##! Panels
bindd = Super, b, Toggle left sidebar, global, quickshell:sidebarLeftToggle # Toggle left sidebar
bindd = Super, n, Toggle right sidebar, global, quickshell:sidebarRightToggle # Toggle right sidebar
bindd = Super, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheet
bindd = Super, m, Toggle media controls, global, quickshell:mediaControlsToggle # Toggle media controls
bindd = Super+Shift, E, Toggle session menu, global, quickshell:sessionToggle # Toggle session menu

bind = Super+Alt, B, global, quickshell:sidebarLeftToggleDetach # [hidden]

# ########################### Keybinds for Master Layout ############################

##! Master Layout

bind = Super, d, layoutmsg, swapwithmaster # Swap window with master

#/# bind = Super, equal/minus or o/i,, # Add/Remove master
bind = Super, equal, layoutmsg, addmaster # [hidden]
bind = Super, minus, layoutmsg, removemaster # [hidden]
# bind = Super, o, layoutmsg, addmaster # [hidden]
# bind = Super+Shift, o, layoutmsg, addmaster # [hidden]
# bind = Super, i, layoutmsg, removemaster # [hidden]
# bind = Super+Shift, i, layoutmsg, removemaster # [hidden]

#/# bind = Super+Ctrl, h/k/l/j or ←/↑/→/↓,, # Change Master position
bind = Super+Ctrl, Left, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu left # [hidden]
bind = Super+Ctrl, Right, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu right # [hidden]
bind = Super+Ctrl, Down, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu center # [hidden]
bind = Super+Ctrl, Up, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu top # [hidden]

bind = Super+Ctrl, h, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu left # [hidden]
bind = Super+Ctrl, l, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu right # [hidden]
bind = Super+Ctrl, j, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu center # [hidden]
bind = Super+Ctrl, k, exec, $HOME/.scripts/hyprland-scripts/keybind-change-orientation.nu top # [hidden]

#/# bind = Super, ]/[,, # Roll stack
bind = Super, bracketleft, layoutmsg, rollnext # [hidden]
bind = Super, bracketright, layoutmsg, rollprev # [hidden]


# ########################### Keybinds for Hyprland ############################

##! Monitors
bind = Super, U, focusmonitor, +1 # Focus next monitor
#/# bind = Super+Shift+Ctrl, l/h,, # Swap monitors
bind = Super+Shift+Ctrl, l, exec, hyprctl dispatch swapactiveworkspaces 'current +1' && hyprctl dispatch focusmonitor r # [hidden]
bind = Super+Shift+Ctrl, h, exec, hyprctl dispatch swapactiveworkspaces 'current +1' && hyprctl dispatch focusmonitor l # [hidden]
bind = Super+Shift, d, exec, hyprctl dispatch swapactiveworkspaces 'current +1' # Swap monitors

##! Screen
# Zoom
binde = Super+Shift, Minus, exec, qs ipc call zoom zoomOut # Zoom out
binde = Super+Shift, Equal, exec, qs ipc call zoom zoomIn # Zoom in
binde = Super+Shift, Minus, exec, qs ipc call TEST_ALIVE || ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.1 # [hidden] Zoom out
binde = Super+Shift, Equal, exec, qs ipc call TEST_ALIVE || ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.1 # [hidden] Zoom in

bind = Super+Shift, mouse_up, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.1 # Zoom out
bind = Super+Shift, mouse_down, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.1 # Zoom in

#!
##! Windows

bind = Super+Shift, Q, killactive, # Close window

bind = Super, s, togglefloating, # Toggle floating

#/# bind = Super+Shift, h/k/l/j,, # Swap windows
bind = Super+Shift, h, exec, hyprnavi l --swap --bordersize 10 # [hidden]
bind = Super+Shift, l, exec, hyprnavi r --swap --bordersize 10 # [hidden]
bind = Super+Shift, k, exec, hyprnavi u --swap # [hidden]
bind = Super+Shift, j, exec, hyprnavi d --swap # [hidden]

#/# bind = Super, ←/↑/→/↓,, # Move windows
bind = Super+Shift, Left, movewindow, l # [hidden]
bind = Super+Shift, Right, movewindow, r # [hidden]
bind = Super+Shift, Up, movewindow, u # [hidden]
bind = Super+Shift, Down, movewindow, d # [hidden]

bind = Super, w, exec, $HOME/.scripts/hyprland-scripts/keybind-cycle-master-width.sh # Cycle window width
bind = Super+Shift, w, exec, $HOME/.scripts/hyprland-scripts/keybind-cycle-master-width.sh vertical# Cycle window width
bind = Super, e, togglegroup, # Toggle group

#/# bind = Super, h/k/l/j or ←/↑/→/↓,, # Focus windows
bind = Super, h, exec, $HOME/.scripts/hyprland-scripts/keybind-move-focus.nu l # [hidden]
bind = Super, l, exec, $HOME/.scripts/hyprland-scripts/keybind-move-focus.nu r # [hidden]

bind = Super, k, exec, $HOME/.scripts/hyprland-scripts/keybind-move-focus.nu u # [hidden]
bind = Super, k, changegroupactive, f # [hidden]

bind = Super, j, exec, $HOME/.scripts/hyprland-scripts/keybind-move-focus.nu d # [hidden]
bind = Super, j, changegroupactive, b # [hidden]

bind = Super, Left, movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up, movefocus, u # [hidden]
bind = Super, Down, movefocus, d # [hidden]

# bind = Super, P, pin # Pin window

#/# bind = Super+Shift, ç,, # Center window
bind = Super+Shift, ccedilla, centerwindow # [hidden]
bind = Super, ccedilla, centerwindow # [hidden]
bind = Super, code:47, centerwindow # [hidden]

bind = Super, F, fullscreen, 0 # Toggle Fullscreen
bind = Super, A, fullscreenstate, 1 -1 # Toggle monocle
bind = Super+Shift, A, fullscreenstate, -1 2 # Toggle fake fullscreen

bind = Super, 1, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:kitty -or class:code --by-workspace # Cycle terminal
bind = Super, 2, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:vivaldi --by-workspace # Cycle browser
bind = Super, 3, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:obsidian -or class:sioyek --by-workspace # Cycle Obsidian
bind = Super, 4, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:vesktop -or class:discord --by-workspace # Cycle Discord

bind = Super+Ctrl, 1, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:kitty -or class:code --bring-window # Cycle terminal
bind = Super+Ctrl, 2, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:vivaldi --bring-window # Cycle browser
bind = Super+Ctrl, 3, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:obsidian -or class:sioyek --bring-window # Cycle Obsidian
bind = Super+Ctrl, 4, exec, $HOME/.scripts/hyprland-scripts/cycle-apps.nu class:vesktop -or class:discord --bring-window # Cycle Discord

##! Workspaces

bind = Super, Tab, workspace, m+1 # Focus next workspace
bind = Super+Shift, Tab, workspace, m-1 # Focus previous workspace
bind = Super+Alt, Tab, movetoworkspace, m+1 # Send (and focus) window to next workspace
bind = Super+Alt+Shift, Tab, movetoworkspace, m-1 # Send (and focus) window to previous workspace

bind = Super, Apostrophe, workspace, emptym # Focus next empty workspace

bind = Super+Alt, Apostrophe, movetoworkspace, emptym # Send (and focus) window to empty workspace

bind = Super+Shift, Apostrophe, movetoworkspacesilent, emptym # Send window to empty workspace

#/# bind = Super+Shift, Hash,, # Focus workspace # (1, 2, 3,...)
bind = Super+Shift, 1, workspace, 1 # [hidden]
bind = Super+Shift, 2, workspace, 2 # [hidden]
bind = Super+Shift, 3, workspace, 3 # [hidden]
bind = Super+Shift, 4, workspace, 4 # [hidden]
bind = Super+Shift, 5, workspace, 5 # [hidden]
bind = Super+Shift, 6, workspace, 6 # [hidden]
bind = Super+Shift, 7, workspace, 7 # [hidden]
bind = Super+Shift, 8, workspace, 8 # [hidden]
bind = Super+Shift, 9, workspace, 9 # [hidden]
bind = Super+Shift, 0, workspace, 10 # [hidden]

#/# bind = Super+Alt, Hash,, # Send (and focus) to workspace # (1, 2, 3,...)
bind = Super+Alt, 1, movetoworkspace, 1 # [hidden]
bind = Super+Alt, 2, movetoworkspace, 2 # [hidden]
bind = Super+Alt, 3, movetoworkspace, 3 # [hidden]
bind = Super+Alt, 4, movetoworkspace, 4 # [hidden]
bind = Super+Alt, 5, movetoworkspace, 5 # [hidden]
bind = Super+Alt, 6, movetoworkspace, 6 # [hidden]
bind = Super+Alt, 7, movetoworkspace, 7 # [hidden]
bind = Super+Alt, 8, movetoworkspace, 8 # [hidden]
bind = Super+Alt, 9, movetoworkspace, 9 # [hidden]
bind = Super+Alt, 0, movetoworkspace, 10 # [hidden]

