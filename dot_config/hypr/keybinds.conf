
#################################### Applications ###################################
# Apps: just normal apps
bind = Super, Return, exec, kitty
bind = Super+Shift, n, exec, nemo
bind = Super+Shift, Return, exec, vivaldi

# Actions
bind = Super+Shift, Q, killactive,
bind = Super, s, togglefloating, 

# Media
bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
bindl= ,XF86AudioNext, exec, playerctl previous
bindl= ,XF86AudioPlay, exec, playerctl play-pause

bindl= ,XF86AudioRaiseVolume, exec, amixer -q -D pulse sset Master 5%+
bindl= ,XF86AudioLowerVolume, exec, amixer -q -D pulse sset Master 5%-

# App launcher
bind = Super, Space, exec, rofi -show drun
# All Rofi scripts
bind = Super, C, exec, ~/.scripts/tools/rofi-all.sh
# Sound Manager
bind = , XF86Search, exec, pavucontrol 
# Zoxide
bind = Super+Ctrl, Space, exec, ~/.scripts/tools/rofi-zoxide.sh 
# Power Menu
bind = Super+Shift, E, exec, rofi -show power-menu -modi "power-menu:rofi-power-menu --choices=lockscreen/shutdown/reboot/logout/suspend/hibernate --no-symbols"
# Clipboard Menu
bind = Super+Shift, v, exec, rofi -modi "clipboard:~/.scripts/tools/greenclip print" -show clipboard -run-command '{cmd}'

###################################### AGS keybinds #####################################
bind = Control+Shift, Escape, exec, hyprctl reload; killall ydotool;
bind = Super+Shift, R, exec, ~/.config/bspwm/bspscripts restart scripts
bind = Super+Shift+Alt, R, exec, ~/.config/bspwm/bspscripts restart programs

############################ Keybinds for Hyprland ############################
# Swap windows
bind = Super+Shift, h, swapwindow, l
bind = Super+Shift, l, swapwindow, r
bind = Super+Shift, k, swapwindow, u
bind = Super+Shift, j, swapwindow, d

# Move windows
bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d

# Focus Windows
bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d

# Focus Next/Previous Workspace
bind = Super, Tab, workspace, m+1
bind = Super+Shift, Tab, workspace, m-1
bind = Super+Alt, Tab, movetoworkspace, m+1
bind = Super+Alt+Shift, Tab, movetoworkspace, m-1

# Swap monitors
bind = Super+Shift+Ctrl, l, swapactiveworkspaces, 0 1
bind = Super+Shift+Ctrl, h, swapactiveworkspaces, 0 1

# Fullscreen
bind = Super, F, fullscreen, 0
bind = Super, A, fullscreen, 1
bind = Super_Alt, F, fakefullscreen, 0


# Focus next empty workspace
bind = Super, Apostrophe, workspace, empty

# Move window to the next empty workspace
bind = Super+Alt, Apostrophe, movetoworkspace, empty

# Move window to the next empty workspace without focusing it
bind = Super+Shift, Apostrophe, movetoworkspacesilent, empty

# Focus Monitor
bind = Super, U, focusmonitor, +1

# Focus Workspace
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10
bind = Super+Shift, A, togglespecialworkspace,

# Move window to workspace Super + Alt + [0-9] 
bind = Super+Alt, 1, movetoworkspace, 1
bind = Super+Alt, 2, movetoworkspace, 2
bind = Super+Alt, 3, movetoworkspace, 3
bind = Super+Alt, 4, movetoworkspace, 4
bind = Super+Alt, 5, movetoworkspace, 5
bind = Super+Alt, 6, movetoworkspace, 6
bind = Super+Alt, 7, movetoworkspace, 7
bind = Super+Alt, 8, movetoworkspace, 8
bind = Super+Alt, 9, movetoworkspace, 9
bind = Super+Alt, 0, movetoworkspace, 10

# Move window to workspace without focusing Super + Shift + [0-9] 
bind = Super+Shift, 1, movetoworkspacesilent, 1
bind = Super+Shift, 2, movetoworkspacesilent, 2
bind = Super+Shift, 3, movetoworkspacesilent, 3
bind = Super+Shift, 4, movetoworkspacesilent, 4
bind = Super+Shift, 5, movetoworkspacesilent, 5
bind = Super+Shift, 6, movetoworkspacesilent, 6
bind = Super+Shift, 7, movetoworkspacesilent, 7
bind = Super+Shift, 8, movetoworkspacesilent, 8
bind = Super+Shift, 9, movetoworkspacesilent, 9
bind = Super+Shift, 0, movetoworkspacesilent, 10

# Move window to Scratchpad
bind = Super+Alt, A, movetoworkspacesilent, special
# Remove window from Scratchpad
bind = Super+Ctrl, A, movetoworkspacesilent, e+0

# Move/resize windows with Super + LMB/RMB and dragging
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
