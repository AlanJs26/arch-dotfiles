# ################################### Applications ###################################
bind = Super, s, togglefloating, 


# ################################### Rofi ###################################

# All Rofi scripts
bind = Super, C, exec, ~/.scripts/rofi-scripts/rofi-all.sh

# Zoxide
bind = Super+Ctrl, Space, exec, ~/.scripts/rofi-scripts/rofi-zoxide.sh 

# Clipboard Menu
bind = Super+Shift, v, exec, rofi -modi "clipboard:~/.scripts/bin/greenclip print" -show clipboard -run-command '{cmd}'

# ########################### Keybinds for Hyprland ############################
# Swap windows
bind = Super+Shift, h, swapwindow, l
bind = Super+Shift, l, swapwindow, r
bind = Super+Shift, k, swapwindow, u
bind = Super+Shift, j, swapwindow, d
# bind = Super+Shift, h, exec, ~/.config/hypr/move_or_swap.sh, l
# bind = Super+Shift, l, exec, ~/.config/hypr/move_or_swap.sh, r
# bind = Super+Shift, k, exec, ~/.config/hypr/move_or_swap.sh, u
# bind = Super+Shift, j, exec, ~/.config/hypr/move_or_swap.sh, d

# Move windows
bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d

bind = Super, w, togglegroup, 
# bind = Super, w, layoutmsg, swapsplit 

# Focus Windows
# bind = Super, h, hycov:movefocus, leftcross
# bind = Super, l, hycov:movefocus, rightcross
# bind = Super, k, hycov:movefocus, upcross
# bind = Super, j, hycov:movefocus, downcross
bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d


bind = Super, Left, movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up, movefocus, u
bind = Super, Down, movefocus, d


# Focus Next/Previous Workspace
bind = Super, Tab, workspace, m+1
bind = Super+Shift, Tab, workspace, m-1
bind = Super+Alt, Tab, movetoworkspace, m+1
bind = Super+Alt+Shift, Tab, movetoworkspace, m-1

# Swap monitors
bind = Super+Shift+Ctrl, l, swapactiveworkspaces, 0 1
bind = Super+Shift+Ctrl, h, swapactiveworkspaces, 0 1
# bind = Super+Shift+Ctrl, l, exec, pypr shift_monitors +1
# bind = Super+Shift+Ctrl, h, exec, pypr shift_monitors +1

# Fullscreen
bind = Super, F, fullscreen, 0
bind = Super, A,fullscreenstate, -1 3
# bind = Super_Alt, F, fakefullscreen, 0


# Focus next empty workspace
bind = Super, Apostrophe, workspace, emptym

# Move window to the next empty workspace
bind = Super+Alt, Apostrophe, movetoworkspace, emptym

# Move window to the next empty workspace without focusing it
bind = Super+Shift, Apostrophe, movetoworkspacesilent, emptym

# Focus Monitor
bind = Super, U, focusmonitor, +1

# Focus Workspace
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

# Move window to workspace Super + Alt + [0-9] 
bind = Super+Alt, 1, movetoworkspace, 1
bind = Super+Alt, 2, movetoworkspace, 2
bind = Super+Alt, 3, movetoworkspace, 3
bind = Super+Alt, 4, movetoworkspace, 4
bind = Super+Alt, 5, movetoworkspace, 5
bind = Super+Alt, 6, movetoworkspace, 6
bind = Super+Alt, 7, movetoworkspace, 7
bind = Super+Alt, 8, movetoworkspace, 8
bind = Super+Alt, 9, movetoworkspace, 9
bind = Super+Alt, 0, movetoworkspace, 10

# Move window to workspace without focusing Super + Shift + [0-9] 
bind = Super+Shift, 1, movetoworkspacesilent, 1
bind = Super+Shift, 2, movetoworkspacesilent, 2
bind = Super+Shift, 3, movetoworkspacesilent, 3
bind = Super+Shift, 4, movetoworkspacesilent, 4
bind = Super+Shift, 5, movetoworkspacesilent, 5
bind = Super+Shift, 6, movetoworkspacesilent, 6
bind = Super+Shift, 7, movetoworkspacesilent, 7
bind = Super+Shift, 8, movetoworkspacesilent, 8
bind = Super+Shift, 9, movetoworkspacesilent, 9
bind = Super+Shift, 0, movetoworkspacesilent, 10

