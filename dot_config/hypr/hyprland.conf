# This file contains general customization options 
# For Environment variables see env.conf
# For Keybinds variables see keybinds.conf 
# For Auto-run stuff see execs.conf
# For Window/layer rules see rules.conf

# Keybinds
source=~/.config/hypr/hyprland/keybinds.conf
source=~/.config/hypr/hyprland/essential_keybinds.conf

# MONITOR CONFIG
monitor = HDMI-A-1, 1920x1080@60, 1360x0, 1
monitor = DP-1, preferred, 0x300, 1

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:DP-1, default:true
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

cursor {
  default_monitor = HDMI-A-1
}

source=~/.config/hypr/env.conf
source=~/.config/hypr/plugins.conf
source=~/.config/hypr/execs.conf

input {
    # Keyboard: Add a layout and uncomment kb_options for Win+Space switching shortcut
    kb_layout = br
    #kb_options = grp:win_space_toggle
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 20

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
    
    special_fallthrough = true
}

binds {
    scroll_event_delay = 0
    allow_pin_fullscreen=true
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_fingers = 4
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

general {
    # Gaps and border
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50
    border_size = 2
    
    # Fallback colors
    col.active_border = rgba(0DB7D4FF)
    col.inactive_border = rgba(31313600)

    resize_on_border = true
    no_focus_fallback = true
    layout = master
    
    allow_tearing = true # some guy told me tearing might make things smoother idk

    snap {
      enabled = true
      window_gap = 15
      monitor_gap = 30
    }
}

dwindle {
    smart_resizing = false
    preserve_split = true
    # smart_split = true
}

master {
  new_status = inherit
  new_on_top = true
  allow_small_split = false
  orientation = left
  always_keep_position = false
}

decoration {
    rounding = 5
    
    blur {
      enabled = true
      xray = false
      special = false
      new_optimizations = on
      size = 1
      passes = 4
      brightness = 1
      noise = 0.01
      contrast = 1
    }

    shadow {
      enabled = true
      range = 25
      ignore_window = true
      offset = 0 2
      render_power = 2
      color = rgba(0000001A)
    }

    # Dim
    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0
}


misc {
    vfr = 1
    vrr = 1
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)

    middle_click_paste = false
    
    disable_hyprland_logo = true
    new_window_takes_over_fullscreen = 2
}

# Window and layer rules
source=~/.config/hypr/hyprland/rules.conf

# Dynamic colors
source=~/.config/hypr/hyprland/colors.conf

# Animations
source=~/.config/hypr/hyprland/animations.conf
