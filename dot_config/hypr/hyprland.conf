# This file contains general customization options 
# For Environment variables see env.conf
# For Keybinds variables see keybinds.conf 
# For Auto-run stuff see execs.conf
# For Window/layer rules see rules.conf

source=~/.config/hypr/env.conf
source=~/.config/hypr/plugins.conf

# MONITOR CONFIG
# monitor=,preferred,auto,1
# monitor=,addreserved, 0, 0, 0, 0

monitor = DP-1, preferred, auto, 1
monitor = DP-2, preferred, 0x300, 1
# monitor=HDMI-A-1,1920x1080@60,1920x0,1,mirror,eDP-1

# Startup executions
source=~/.config/hypr/execs.conf

input {
    # Keyboard: Add a layout and uncomment kb_options for Win+Space switching shortcut
    kb_layout = br
    #kb_options = grp:win_space_toggle
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 20

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
    
    special_fallthrough = true
}

binds {
    # focus_window_on_workspace_c# For Auto-run stuff see execs.confhange = true
    scroll_event_delay = 0
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_fingers = 4
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

general {
    # Gaps and border
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50
    border_size = 1
    
    # Fallback colors
    col.active_border = rgba(0DB7D4FF)
    col.inactive_border = rgba(31313600)

    resize_on_border = true
    no_focus_fallback = true
    layout = dwindle
    
    #focus_to_other_workspaces = true # ahhhh i still haven't properly implemented this
    allow_tearing = true # some guy told me tearing might make things smoother idk
}

dwindle {
    preserve_split = true
    no_gaps_when_only = 1
    smart_split = true
    smart_resizing = false
}

decoration {
    rounding = 5
    
    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = on
        size = 5
        passes = 4
        brightness = 1
        noise = 0.01
        contrast = 1
    }
    # Shadow
    drop_shadow = true
    shadow_ignore_window = true
    shadow_range = 20
    shadow_offset = 0 2
    shadow_render_power = 2
    col.shadow = rgba(0000001A)
    
    # Shader
    # screen_shader = ~/.config/hypr/shaders/nothing.frag
    # screen_shader = ~/.config/hypr/shaders/vibrance.frag
    
    # Dim
    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0
}


misc {
    vfr = 1
    vrr = 1
    #layers_hog_mouse_focus = true
    focus_on_activate = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = true
    new_window_takes_over_fullscreen = 2
}

debug {
	# overlay = true
	# damage_tracking = 0

    # damage_blink = yes
}

# Window and layer rules
layerrule = noanim, selection
source=~/.config/hypr/rules.conf

# Dynamic colors
source=~/.config/hypr/colors.conf

# Keybinds
source=~/.config/hypr/keybinds.conf

source=~/.config/hypr/animations.conf

# windowrulev2=rounding 20, onworkspace:1
