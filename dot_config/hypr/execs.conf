# Wallpaper
exec-once = (pgrep dunst|xargs kill -9) && hyprpaper

# Idle management
exec-once = hypridle

# pypr plugins
exec-once = pypr

# Input method
exec-once = fcitx5 -d &

# Polkit agent
exec-once = systemctl --user start hyprpolkitagent

# # Cursor
# exec-once = hyprctl setcursor Bibata-Modern-Classic 20

exec = dots autostart hyprland_programs; notify-send archdots autostart

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
