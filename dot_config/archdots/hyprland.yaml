autostart:
- commands:
  - nm-applet
  - hyprpanel
  - syncthing serve --no-browser --logfile=default
  - fcitx5 -d
  match_method: name
  name: hyprland_programs
- commands:
  - cycle-audio-devices.nu --refresh
  - rm /tmp/.evrouter:0||true
  - xmodmap $HOME/.config/X11/xmodmap
  - killall dunst||true
  daemon: false
  name: always_hyprland
  priority: 10
  run_with:
  - hyprland_programs
