import: ./chezmoi.yaml
import: ./pkgs.yaml
apps:
  browser: vivaldi-snapshot
  file_explorer: nemo
  terminal: kitty
  sound_manager: pavucontrol
  pdf_viewer: sioyek
  music_player: youtube-music
autostart:
  - name: programs
    match_method: name
    commands:
      - "fcitx5 -d"
      - "syncthing serve --no-browser --logfile=default"
      - "dunst"
      - "nm-applet"
      - "picom"
      - "evrouter --config $HOME/.config/evrouter/.evrouterrc /dev/input/by-id/usb-18f8_USB_GAMING_MOUSE-event-mouse /dev/input/by-id/usb-SONiX_USB_DEVICE-event-kbd"
      - "greenclip daemon"
      - "bspdragwin.py --daemon"
      - "eww daemon --restart"
      - "jgmenu --hide-on-startup"
      - "bspswallow"
      - "unclutter --timeout 10 --exclude-root"
      - "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1"
      - "syncthing-gtk --minimized"
  - name: scripts 
    match_method: cmdline
    commands:
      - "$BSPDIR/color-border-mode.sh"
      - "$BSPDIR/fix-polybar-fullscreen.sh"
      - "$HOME/.config/eww/scripts/music_helper.sh --cover_daemon"
  - name: always 
    daemon: false
    priority: 10
    commands:
      - "xmodmap $HOME/.config/X11/xmodmap"
      - "rm /tmp/.evrouter:0||true"
      - "$TOOLS/setup-monitors.sh"
      - "cycle-audio-devices.nu --refresh"
backup:
  - source: "/mnt/DiscoExterno/_Arquivos/PDFs"
    destination: "drive-usp:PDFs"
    action: copy
  - source: "/mnt/DiscoExterno/ObsidianVaults/USP"
    destination: "drive-usp:Obsidian/USP"
    action: copy
  - source: "/mnt/DiscoExterno/_Codes"
    destination: "drive-usp:Codes"
    action: copy
    ignore-patterns:
      - '\.?v?env/'
      - 'node_modules/'
      - 'target/'
      - 'build/'
      - '\.CondaPkg/'


